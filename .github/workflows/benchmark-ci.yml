name: Benchmark CI

on:
  push:
    branches: [ main ]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Set Python Version ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Requirements
        run: pip install -r install/requirements.txt

      # config.py is required for module imports
      - name: Rename config.template.py To config.py
        run: cp config/config.template.py config/config.py

      - name: Prepare Necessary Files And Directories
        run: |
          mkdir -p logs
          mkdir -p archivedata
          echo "INFO: Test log content" > logs/refreshMetadata.log

      - name: Run Benchmark
        run: |
          export PYTHONPATH=$PWD
          python run_benchmark.py
        continue-on-error: true

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v7
        with:
          name: python${{ matrix.python-version }}-benchmark-results
          path: benchmark_results/
